version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: fastapi-study-postgres
    environment:
      POSTGRES_DB: study_inventory
      POSTGRES_USER: study
      POSTGRES_PASSWORD: study
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U study -d study_inventory"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
