services:
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rabbitmq-priority-scheduler
    hostname: rabbitmq-priority-scheduler
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "status"]
      interval: 15s
      timeout: 10s
      retries: 8
