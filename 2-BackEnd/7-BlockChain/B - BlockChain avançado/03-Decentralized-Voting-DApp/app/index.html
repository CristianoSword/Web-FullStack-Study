<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voting DApp</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="layout">
      <section class="panel">
        <p class="eyebrow">Decentralized Voting</p>
        <h1 id="title">Election Dashboard</h1>
        <p id="status">Connect a wallet and load the election data.</p>
        <div class="actions">
          <button id="connectButton">Connect Wallet</button>
          <button id="loadButton">Load Results</button>
        </div>
        <label class="field">
          <span>Contract Address</span>
          <input id="contractAddress" placeholder="0x..." />
        </label>
      </section>

      <section class="panel">
        <div id="results" class="results"></div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.2/dist/ethers.umd.min.js"></script>
    <script type="module" src="./main.js"></script>
  </body>
</html>
