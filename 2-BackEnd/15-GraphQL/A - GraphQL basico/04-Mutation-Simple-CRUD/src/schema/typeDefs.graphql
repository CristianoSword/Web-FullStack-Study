type Task {
  id: ID!
  title: String!
  description: String!
  status: String!
}

input CreateTaskInput {
  title: String!
  description: String!
}

input UpdateTaskInput {
  title: String
  description: String
  status: String
}

type Query {
  tasks: [Task!]!
  task(id: ID!): Task
}

type Mutation {
  createTask(input: CreateTaskInput!): Task!
  updateTask(id: ID!, input: UpdateTaskInput!): Task
  deleteTask(id: ID!): Boolean!
}
