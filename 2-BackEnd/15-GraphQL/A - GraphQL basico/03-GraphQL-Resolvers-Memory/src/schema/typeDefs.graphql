type User {
  id: ID!
  name: String!
  email: String!
  role: String!
  posts: [Post!]!
}

type Post {
  id: ID!
  title: String!
  category: String!
  published: Boolean!
  authorId: ID!
  author: User!
}

type Query {
  users: [User!]!
  user(id: ID!): User
  posts(authorId: ID, published: Boolean): [Post!]!
  post(id: ID!): Post
}
