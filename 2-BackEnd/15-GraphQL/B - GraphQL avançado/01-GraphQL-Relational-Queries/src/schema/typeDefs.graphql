type Author {
  id: ID!
  name: String!
  team: String!
  posts: [Post!]!
}

type Post {
  id: ID!
  title: String!
  slug: String!
  authorId: ID!
  author: Author!
  comments: [Comment!]!
}

type Comment {
  id: ID!
  postId: ID!
  authorName: String!
  body: String!
}

type Query {
  authors: [Author!]!
  author(id: ID!): Author
  postsByTeam(team: String!): [Post!]!
}
