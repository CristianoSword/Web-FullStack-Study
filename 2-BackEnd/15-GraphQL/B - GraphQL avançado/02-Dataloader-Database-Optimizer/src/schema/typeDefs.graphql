type Author {
  id: ID!
  name: String!
  team: String!
}

type PostMetric {
  postId: ID!
  views: Int!
  likes: Int!
}

type Post {
  id: ID!
  title: String!
  authorId: ID!
  author: Author!
  metric: PostMetric!
}

type Query {
  posts(limit: Int = 10): [Post!]!
  authors: [Author!]!
  sqlStats: SqlStats!
}

type SqlStats {
  executedQueries: Int!
  recentStatements: [String!]!
}
