<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Physics Engine 2D Wasm</title>
    <style>
      body {
        margin: 0;
        padding: 2rem;
        font-family: "Segoe UI", sans-serif;
        background: radial-gradient(circle at top, #0f172a, #020617);
        color: #e2e8f0;
      }

      .panel {
        max-width: 900px;
        margin: 0 auto;
      }

      .toolbar {
        display: flex;
        gap: 0.75rem;
        margin: 1rem 0;
      }

      button {
        border: none;
        border-radius: 12px;
        padding: 0.8rem 1.2rem;
        background: #38bdf8;
        color: #082f49;
        font-weight: 700;
        cursor: pointer;
      }

      canvas {
        width: 100%;
        max-width: 720px;
        border-radius: 20px;
        border: 1px solid rgba(148, 163, 184, 0.2);
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <h1>Physics Engine 2D Wasm</h1>
      <p>Rust/Wasm advances the world state while the canvas renders bouncing circular bodies.</p>
      <div class="toolbar">
        <button id="play">Play</button>
        <button id="reset">Reset</button>
      </div>
      <p id="status">World ready.</p>
      <canvas id="canvas"></canvas>
    </main>
    <script type="module" src="./app.js"></script>
  </body>
</html>
