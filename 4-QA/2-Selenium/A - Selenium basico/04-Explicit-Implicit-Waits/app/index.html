<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Waits Lab</title>
  </head>
  <body>
    <button id="load-button">Load message</button>
    <p id="result"></p>
    <script>
      document.getElementById("load-button").addEventListener("click", () => {
        setTimeout(() => {
          document.getElementById("result").textContent = "Async message loaded";
        }, 1200);
      });
    </script>
  </body>
  </html>
