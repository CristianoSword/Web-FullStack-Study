<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Network Mocking Routing</title>
    <style>
      body {
        margin: 0;
        background: #f8fafc;
        color: #0f172a;
        font-family: "Segoe UI", sans-serif;
      }

      main {
        max-width: 960px;
        margin: 0 auto;
        padding: 32px 20px 48px;
      }

      .hero,
      .lesson {
        background: #ffffff;
        border-radius: 18px;
        padding: 18px;
        box-shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
      }

      .hero img {
        width: 100%;
        max-width: 420px;
        border-radius: 14px;
      }

      .grid {
        display: grid;
        gap: 14px;
        margin-top: 18px;
      }

      button {
        border: 0;
        border-radius: 12px;
        padding: 10px 14px;
        background: #0f766e;
        color: #ffffff;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <h1>Sandbox de interceptação de rede</h1>
        <img id="hero-image" src="https://cdn.study.dev/banner.png" alt="Banner externo" />
        <p id="hero-status">Imagem aguardando carregamento.</p>
        <button type="button" id="reload-button">Recarregar trilhas</button>
      </section>

      <section class="grid" id="lesson-grid" aria-live="polite"></section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
