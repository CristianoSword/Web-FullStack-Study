<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Visual Regression Snapshots</title>
    <style>
      body {
        margin: 0;
        background: #fff7ed;
        color: #7c2d12;
        font-family: Georgia, "Times New Roman", serif;
      }

      .wrapper {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px;
      }

      .card {
        width: 680px;
        background: #ffedd5;
        border: 3px solid #c2410c;
        border-radius: 24px;
        padding: 28px;
        box-shadow: 0 18px 40px rgba(124, 45, 18, 0.14);
      }

      .metrics {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        margin-top: 18px;
      }

      .metric {
        background: #ffffff;
        border-radius: 16px;
        padding: 16px;
      }
    </style>
  </head>
  <body>
    <main class="wrapper">
      <section class="card" data-testid="dashboard-card">
        <p>Snapshot base para regressão visual</p>
        <h1>Painel de métricas congelado</h1>
        <div class="metrics">
          <article class="metric">
            <strong>24</strong>
            <p>Módulos totais</p>
          </article>
          <article class="metric">
            <strong>91%</strong>
            <p>Cobertura de UI</p>
          </article>
          <article class="metric">
            <strong>5</strong>
            <p>Diferenças críticas</p>
          </article>
        </div>
      </section>
    </main>
  </body>
</html>
