<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>POM Login</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #faf5ff;
        color: #581c87;
        font-family: "Segoe UI", sans-serif;
      }

      .panel {
        width: min(460px, calc(100vw - 32px));
        background: #ffffff;
        border-radius: 20px;
        padding: 28px;
        box-shadow: 0 18px 40px rgba(88, 28, 135, 0.12);
      }

      input {
        width: 100%;
        margin-top: 8px;
        margin-bottom: 14px;
        padding: 12px;
        border-radius: 12px;
        border: 1px solid #e9d5ff;
        box-sizing: border-box;
      }

      button {
        border: 0;
        border-radius: 12px;
        padding: 10px 14px;
        background: #9333ea;
        color: #ffffff;
        cursor: pointer;
        width: 100%;
      }
    </style>
  </head>
  <body data-page="login">
    <section class="panel">
      <h1>Login do laboratório POM</h1>
      <form id="login-form">
        <label for="name">Nome</label>
        <input id="name" name="name" type="text" />

        <label for="track">Trilha</label>
        <input id="track" name="track" type="text" />

        <button type="submit">Entrar no dashboard</button>
      </form>
    </section>

    <script src="./app.js"></script>
  </body>
</html>
