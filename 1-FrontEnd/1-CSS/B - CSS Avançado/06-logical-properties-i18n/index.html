<!DOCTYPE html>
<html lang="pt-br" dir="ltr" id="root">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logical Properties | i18n Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="dashboard">
        <header>
            <div class="lang-switcher">
                <button onclick="toggleDir('ltr')">LTR (Português)</button>
                <button onclick="toggleDir('rtl')">RTL (Árabe/Hebraico)</button>
            </div>
            <h1>Dashboard Global</h1>
        </header>

        <section class="card-grid">
            <article class="info-card">
                <div class="icon">📊</div>
                <div class="text">
                    <h3>Vendas Totais</h3>
                    <p>Relatório de performance semanal.</p>
                </div>
                <button class="action-btn">→</button>
            </article>
        </section>
    </main>

    <script>
        function toggleDir(dir) {
            document.getElementById('root').dir = dir;
        }
    </script>
</body>
</html>
