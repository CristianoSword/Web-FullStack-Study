<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Transitions API | Cinema Experience</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main id="app" aria-live="polite">
        <!-- O conteúdo será alternado dinamicamente -->
        <section class="page home">
            <header>
                <h1>CineModern</h1>
                <p>Explore a nova era de transições fluidas no CSS.</p>
            </header>
            
            <div class="movie-grid" role="list">
                <article class="movie-card" onclick="navigateTo('interstellar')" role="listitem" aria-label="Ver detalhes de Interstellar">
                    <div class="movie-thumb" style="background-image: url('https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?auto=format&fit=crop&w=400&q=80')"></div>
                    <div class="movie-info">
                        <h3>Interstellar</h3>
                        <span>Sci-Fi / Drama</span>
                    </div>
                </article>
                
                <article class="movie-card" onclick="navigateTo('inception')" role="listitem" aria-label="Ver detalhes de Inception">
                    <div class="movie-thumb" style="background-image: url('https://images.unsplash.com/photo-1536440136628-849c177e76a1?auto=format&fit=crop&w=400&q=80')"></div>
                    <div class="movie-info">
                        <h3>Inception</h3>
                        <span>Action / Sci-Fi</span>
                    </div>
                </article>
            </div>
        </section>
    </main>

    <script>
        const movies = {
            interstellar: {
                title: 'Interstellar',
                genre: 'Sci-Fi / Drama',
                img: 'https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?auto=format&fit=crop&w=800&q=80',
                desc: 'A team of explorers travel through a wormhole in space in an attempt to ensure humanity\'s survival.'
            },
            inception: {
                title: 'Inception',
                genre: 'Action / Sci-Fi',
                img: 'https://images.unsplash.com/photo-1536440136628-849c177e76a1?auto=format&fit=crop&w=800&q=80',
                desc: 'A thief who steals corporate secrets through the use of dream-sharing technology is given the inverse task.'
            }
        };

        function navigateTo(movieId) {
            const movie = movies[movieId];
            
            // Verifica suporte para View Transitions API
            if (!document.startViewTransition) {
                renderDetails(movie);
                return;
            }

            // Inicia a transição
            document.startViewTransition(() => {
                renderDetails(movie);
            });
        }

        function renderDetails(movie) {
            const app = document.getElementById('app');
            app.innerHTML = `
                <section class="page details">
                    <button class="back-btn" onclick="renderHome()">← Voltar</button>
                    <div class="movie-banner" style="background-image: url('${movie.img}')"></div>
                    <div class="movie-content">
                        <h1>${movie.title}</h1>
                        <span class="genre">${movie.genre}</span>
                        <p class="desc">${movie.desc}</p>
                    </div>
                </section>
            `;
        }

        function renderHome() {
            if (!document.startViewTransition) {
                location.reload(); // Simplificação para o exemplo
                return;
            }

            document.startViewTransition(() => {
                location.reload(); // Voltando para a Home
            });
        }
    </script>
</body>
</html>
