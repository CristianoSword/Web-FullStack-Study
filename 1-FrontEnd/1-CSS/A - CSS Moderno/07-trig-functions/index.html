<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Moderno - Funções Trigonométricas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Estudo de CSS Moderno: Funções Trigonométricas</h1>
        <p>Calculando posições circulares com <code>sin()</code> e <code>cos()</code>.</p>
    </header>

    <main class="container">
        <div class="circular-menu">
            <div class="center-point">Menu</div>
            <!-- Itens do menu que serão posicionados via CSS Math -->
            <div class="menu-item" style="--index: 0;">1</div>
            <div class="menu-item" style="--index: 1;">2</div>
            <div class="menu-item" style="--index: 2;">3</div>
            <div class="menu-item" style="--index: 3;">4</div>
            <div class="menu-item" style="--index: 4;">5</div>
            <div class="menu-item" style="--index: 5;">6</div>
            <div class="menu-item" style="--index: 6;">7</div>
            <div class="menu-item" style="--index: 7;">8</div>
        </div>
    </main>
</body>
</html>
