<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anchor Positioning | Smart UI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="dashboard">
        <header>
            <h1>Smart Anchor Dashboard</h1>
            <p>Posicionamento inteligente nativo sem JavaScript.</p>
        </header>

        <section class="controls">
            <button class="anchor-btn" id="btn-save">Salvar Projeto</button>
            <button class="anchor-btn" id="btn-delete">Excluir Tudo</button>
            <button class="anchor-btn" id="btn-share">Compartilhar</button>
        </section>

        <!-- Tooltips que serão ancorados -->
        <div class="tooltip" id="tooltip-save">Clique para salvar seu progresso na nuvem.</div>
        <div class="tooltip" id="tooltip-delete">Atenção: Esta ação é irreversível!</div>
        <div class="tooltip" id="tooltip-share">Gere um link público para este dashboard.</div>
    </main>
</body>
</html>
