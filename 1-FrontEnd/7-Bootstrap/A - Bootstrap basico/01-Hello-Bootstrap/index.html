<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AuraCore | Hello Bootstrap</title>
  <!-- Bootstrap 5 CSS CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Local Styles -->
  <link href="src/css/styles.css" rel="stylesheet">
</head>
<body>

  <div class="glow-orb orb-right"></div>

  <div class="container py-5 position-relative">
    <!-- Header -->
    <header class="text-center mb-5">
      <span class="badge bg-secondary mb-2 text-uppercase font-monospace tracking-wide">Módulo 7 - Iniciando</span>
      <h1 class="display-4 fw-bold text-light mb-3">Hello Bootstrap 5</h1>
      <p class="text-secondary lead">Showcase interativo dos elementos e componentes nativos fundamentais.</p>
    </header>

    <!-- Component Gallery Row -->
    <section id="components-list-container" class="row mb-5">
      <!-- Rendered dynamically by main.js -->
    </section>

    <!-- Interactive Section -->
    <section class="card p-4 component-showcase-card mb-4">
      <h2 class="h4 text-light mb-4">⚡ Painel Interativo</h2>
      <div class="row align-items-center">
        <!-- Interactive Alert Trigger -->
        <div class="col-md-6 mb-4 mb-md-0">
          <h3 class="h6 text-secondary text-uppercase mb-3">1. Alertas Dinâmicos</h3>
          <button id="trigger-alert-btn" class="btn btn-outline-info px-4 py-2 fw-bold text-uppercase small">Disparar Alerta</button>
          <div id="dynamic-alert-container" class="mt-3"></div>
        </div>

        <!-- Interactive Spinner Toggle -->
        <div class="col-md-6">
          <h3 class="h6 text-secondary text-uppercase mb-3">2. Controle de Processamento</h3>
          <button id="toggle-spinner-btn" class="btn btn-outline-primary px-4 py-2 fw-bold text-uppercase small">Iniciar Processamento</button>
          <div class="mt-3 d-flex align-items-center gap-3">
            <div id="showcase-spinner" class="spinner-border text-primary d-none" role="status">
              <span class="visually-hidden">Carregando...</span>
            </div>
          </div>
        </div>
      </div>
    </section>
  </div>

  <!-- Bootstrap 5 Bundle JS CDN -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Local Logic -->
  <script type="module" src="src/js/main.js"></script>
</body>
</html>
