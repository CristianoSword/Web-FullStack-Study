<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AuraAccess | Secure Registration</title>
  <!-- Bootstrap 5 CSS CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Local Styles -->
  <link href="src/css/styles.css" rel="stylesheet">
</head>
<body>

  <main class="form-wrapper-card p-4 p-sm-5 my-5">
    <div class="text-center mb-4">
      <span class="fs-4 fw-bold text-light">⚡ AURA<span style="color: #d81b60;">ACCESS</span></span>
      <p class="text-secondary small mt-2">Validação de entrada estritamente acoplada no cliente.</p>
    </div>

    <!-- Success banner -->
    <div id="success-banner-container" class="mb-3"></div>

    <!-- Registration Form -->
    <form id="interactive-form" class="needs-validation" novalidate>
      <div id="dynamic-fields-container">
        <!-- Rendered dynamically by main.js -->
      </div>
      
      <!-- Terms of Service checkbox -->
      <div class="col-12 mb-3 mt-3">
        <div class="form-check">
          <input class="form-check-input bg-dark border-secondary" type="checkbox" value="" id="invalidCheck" required>
          <label class="form-check-label text-secondary small" for="invalidCheck">
            Aceito as diretrizes de segurança da AuraCore
          </label>
          <div class="invalid-feedback small">
            Você deve aceitar os termos antes de prosseguir.
          </div>
        </div>
      </div>
      
      <div class="col-12 mt-4">
        <button class="btn btn-magenta w-100 py-3 rounded-3 text-uppercase small" type="submit">Ativar Conta</button>
      </div>
    </form>
  </main>

  <!-- Bootstrap 5 Bundle JS CDN -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Local Logic -->
  <script type="module" src="src/js/main.js"></script>
</body>
</html>
