<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AuraCore | Dashboard Pro</title>
  <!-- Bootstrap 5 CSS CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Local Styles -->
  <link href="src/css/styles.css" rel="stylesheet">
</head>
<body>

  <div class="container py-5">
    <!-- Header -->
    <header class="d-flex flex-column flex-sm-row justify-content-between align-items-center mb-5 gap-3">
      <div>
        <span class="badge bg-secondary mb-2 text-uppercase font-monospace tracking-wide">Módulo 7 - Avançado</span>
        <h1 class="h2 fw-bold text-light mb-1">AuraCore Telemetria Pro</h1>
        <p class="text-secondary mb-0 small">Análise de métricas de rede e estabilidade operacional em tempo real.</p>
      </div>
      <div>
        <button id="simulate-telemetry-btn" class="btn btn-outline-info fw-bold py-2 px-4 text-uppercase small">
          ⚡ Simular Telemetria
        </button>
      </div>
    </header>

    <!-- Metrics Widgets Row -->
    <main id="widgets-container" class="row mb-5">
      <!-- Rendered dynamically by main.js -->
    </main>

    <!-- System Processes Table -->
    <section class="card p-4 border-secondary bg-dark text-light bg-dark-purple mb-4">
      <h3 class="h5 mb-4 text-light">Processos Ativos</h3>
      <div class="table-responsive">
        <table class="table table-dark table-hover border-secondary mb-0">
          <thead>
            <tr>
              <th class="border-secondary text-secondary">ID do Processo</th>
              <th class="border-secondary text-secondary">Serviço</th>
              <th class="border-secondary text-secondary">Memória Alocada</th>
              <th class="border-secondary text-secondary">Uso de Fila</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td class="border-secondary">pid-5412</td>
              <td class="border-secondary">Orquestrador de Mensageria</td>
              <td class="border-secondary">124 MB</td>
              <td class="border-secondary text-success">Ótimo</td>
            </tr>
            <tr>
              <td class="border-secondary">pid-1204</td>
              <td class="border-secondary">Renderizador de UI</td>
              <td class="border-secondary">85 MB</td>
              <td class="border-secondary text-success">Ótimo</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </div>

  <!-- Bootstrap 5 Bundle JS CDN -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Local Logic -->
  <script type="module" src="src/js/main.js"></script>
</body>
</html>
