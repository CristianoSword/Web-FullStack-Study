<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AuraPortfolio | High-Fidelity Showcase</title>
  <!-- Bootstrap 5 CSS CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Local Styles -->
  <link href="src/css/styles.css" rel="stylesheet">
</head>
<body>

  <div class="container py-5">
    <!-- Header -->
    <header class="text-center mb-5">
      <span class="badge bg-secondary mb-2 text-uppercase font-monospace tracking-wide">Módulo 7 - Avançado</span>
      <h1 class="display-4 fw-bold text-light mb-3">Portfolio de Engenharia</h1>
      <p class="text-secondary lead">Showcase interativo contendo soluções tecnológicas escaláveis.</p>
    </header>

    <!-- Filters Row -->
    <section class="d-flex flex-wrap justify-content-center gap-3 mb-5">
      <button class="btn btn-neon filter-btn active px-4 py-2" data-filter="all">Todos</button>
      <button class="btn btn-outline-secondary text-light filter-btn px-4 py-2" data-filter="frontend">Frontend</button>
      <button class="btn btn-outline-secondary text-light filter-btn px-4 py-2" data-filter="graphics">Gráficos 3D</button>
      <button class="btn btn-outline-secondary text-light filter-btn px-4 py-2" data-filter="backend">Backend</button>
    </section>

    <!-- Portfolio Grid Container -->
    <main id="portfolio-grid-container" class="row">
      <!-- Rendered dynamically by main.js -->
    </main>
  </div>

  <!-- Bootstrap 5 Bundle JS CDN -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Local Logic -->
  <script type="module" src="src/js/main.js"></script>
</body>
</html>
