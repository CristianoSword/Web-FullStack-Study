<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AuraThemes | Custom Bootstrap 5</title>
  <!-- Bootstrap 5 CSS CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Compiled Local Styles -->
  <link href="src/css/styles.css" rel="stylesheet">
</head>
<body>

  <div class="container py-5">
    <!-- Header -->
    <header class="text-center mb-5">
      <span class="badge bg-secondary mb-2 text-uppercase font-monospace tracking-wide">Módulo 7 - Avançado</span>
      <h1 class="display-4 fw-bold text-light mb-3">Custom Themed Bootstrap</h1>
      <p class="text-secondary lead">Sobrescrita de variáveis globais nativas do Bootstrap compiladas via SASS.</p>
    </header>

    <!-- Theme Toggles -->
    <div class="text-center mb-5">
      <button id="theme-toggle-btn" class="btn btn-primary px-4 py-3 rounded-pill">Alternar para Modo Suave</button>
    </div>

    <!-- Color Palette Swatches -->
    <section class="card p-4 border-secondary bg-dark text-light mb-5">
      <h3 class="h5 mb-4 text-light">Amostras da Paleta SASS</h3>
      <div class="d-flex flex-wrap gap-4 justify-content-center">
        <div class="text-center">
          <div class="rounded-circle mb-2" style="width: 60px; height: 60px; background-color: var(--primary-color);"></div>
          <span class="small text-secondary font-monospace">$primary</span>
        </div>
        <div class="text-center">
          <div class="rounded-circle mb-2" style="width: 60px; height: 60px; background-color: var(--success-color);"></div>
          <span class="small text-secondary font-monospace">$success</span>
        </div>
        <div class="text-center">
          <div class="rounded-circle mb-2" style="width: 60px; height: 60px; background-color: var(--info-color);"></div>
          <span class="small text-secondary font-monospace">$info</span>
        </div>
      </div>
    </section>

    <!-- Theme Elements Showcase -->
    <main id="theme-elements-container" class="row">
      <!-- Rendered dynamically by main.js -->
    </main>
  </div>

  <!-- Bootstrap 5 Bundle JS CDN -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Local Logic -->
  <script type="module" src="src/js/main.js"></script>
</body>
</html>
