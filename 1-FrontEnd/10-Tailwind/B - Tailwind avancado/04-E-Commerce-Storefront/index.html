<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>04 - E-Commerce Storefront | Tailwind Avancado</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-stone-50 text-stone-950">
  <header class="sticky top-0 z-10 border-b border-stone-200 bg-white/95 backdrop-blur">
    <div class="mx-auto flex max-w-7xl items-center justify-between px-5 py-4">
      <a href="#" class="text-xl font-black">North Store</a>
      <nav class="hidden items-center gap-6 text-sm font-semibold text-stone-600 md:flex">
        <a class="text-stone-950" href="#">Catalogo</a>
        <a href="#">Colecoes</a>
        <a href="#">Entrega</a>
      </nav>
      <button id="cartButton" class="rounded-lg bg-stone-950 px-4 py-2 text-sm font-bold text-white">
        Carrinho (0)
      </button>
    </div>
  </header>

  <main class="mx-auto max-w-7xl px-5 py-7">
    <section class="grid gap-5 lg:grid-cols-[280px_1fr]">
      <aside class="h-fit rounded-lg border border-stone-200 bg-white p-4 shadow-sm">
        <h1 class="text-lg font-black">Filtros</h1>
        <label class="mt-4 block text-sm font-bold">
          Busca
          <input id="searchInput" class="mt-2 w-full rounded-lg border border-stone-300 px-3 py-2 text-sm outline-none focus:border-stone-950" placeholder="tenis, mochila..." />
        </label>

        <div class="mt-5">
          <p class="text-sm font-bold">Categoria</p>
          <div class="mt-2 grid gap-2 text-sm">
            <label class="flex items-center gap-2"><input type="radio" name="category" value="all" checked /> Todos</label>
            <label class="flex items-center gap-2"><input type="radio" name="category" value="calcados" /> Calcados</label>
            <label class="flex items-center gap-2"><input type="radio" name="category" value="bolsas" /> Bolsas</label>
            <label class="flex items-center gap-2"><input type="radio" name="category" value="roupas" /> Roupas</label>
          </div>
        </div>

        <label class="mt-5 block text-sm font-bold">
          Ordenar
          <select id="sortSelect" class="mt-2 w-full rounded-lg border border-stone-300 px-3 py-2 text-sm outline-none focus:border-stone-950">
            <option value="featured">Destaques</option>
            <option value="price-asc">Menor preco</option>
            <option value="price-desc">Maior preco</option>
          </select>
        </label>
      </aside>

      <section>
        <div class="mb-5 flex flex-col gap-3 sm:flex-row sm:items-end sm:justify-between">
          <div>
            <p class="text-xs font-black uppercase tracking-widest text-emerald-700">summer drop</p>
            <h2 class="mt-1 text-3xl font-black">Produtos selecionados</h2>
          </div>
          <p id="resultCount" class="text-sm font-semibold text-stone-500"></p>
        </div>

        <div id="productGrid" class="grid gap-4 sm:grid-cols-2 xl:grid-cols-3"></div>
      </section>
    </section>
  </main>

  <template id="productTemplate">
    <article class="group overflow-hidden rounded-lg border border-stone-200 bg-white shadow-sm transition duration-200 hover:-translate-y-1 hover:shadow-xl">
      <div class="product-art aspect-[4/3] bg-stone-100"></div>
      <div class="p-4">
        <div class="flex items-start justify-between gap-3">
          <div>
            <h3 class="product-name font-black"></h3>
            <p class="product-category mt-1 text-xs font-bold uppercase tracking-widest text-stone-400"></p>
          </div>
          <strong class="product-price whitespace-nowrap text-stone-950"></strong>
        </div>
        <p class="product-description mt-3 min-h-10 text-sm text-stone-500"></p>
        <button class="add-cart mt-4 w-full rounded-lg bg-stone-950 px-4 py-2 text-sm font-bold text-white transition hover:bg-emerald-700">
          Adicionar
        </button>
      </div>
    </article>
  </template>

  <script>
    const products = [
      { id: 1, name: 'Tenis Runner', category: 'calcados', price: 389, tone: 'from-sky-200 to-blue-500', description: 'Cabedal respiravel e solado leve para treino diario.' },
      { id: 2, name: 'Mochila City', category: 'bolsas', price: 249, tone: 'from-emerald-200 to-teal-600', description: 'Compartimento para notebook e bolsos externos.' },
      { id: 3, name: 'Jaqueta Urban', category: 'roupas', price: 529, tone: 'from-stone-300 to-stone-700', description: 'Tecido resistente, corte reto e bolsos utilitarios.' },
      { id: 4, name: 'Sandalia Cloud', category: 'calcados', price: 179, tone: 'from-amber-200 to-orange-500', description: 'Conforto para uso casual com palmilha macia.' },
      { id: 5, name: 'Bolsa Weekend', category: 'bolsas', price: 459, tone: 'from-rose-200 to-pink-600', description: 'Volume amplo para viagens curtas e acabamento premium.' },
      { id: 6, name: 'Camisa Linen', category: 'roupas', price: 219, tone: 'from-lime-100 to-lime-500', description: 'Linho misto, toque fresco e caimento relaxado.' }
    ];

    const grid = document.getElementById('productGrid');
    const template = document.getElementById('productTemplate');
    const searchInput = document.getElementById('searchInput');
    const sortSelect = document.getElementById('sortSelect');
    const resultCount = document.getElementById('resultCount');
    const cartButton = document.getElementById('cartButton');
    let cartCount = 0;

    function money(value) {
      return value.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }

    function selectedCategory() {
      return document.querySelector('input[name="category"]:checked').value;
    }

    function currentProducts() {
      const query = searchInput.value.trim().toLowerCase();
      const category = selectedCategory();
      const sorted = [...products]
        .filter((product) => category === 'all' || product.category === category)
        .filter((product) => product.name.toLowerCase().includes(query) || product.description.toLowerCase().includes(query));

      if (sortSelect.value === 'price-asc') sorted.sort((a, b) => a.price - b.price);
      if (sortSelect.value === 'price-desc') sorted.sort((a, b) => b.price - a.price);
      return sorted;
    }

    function render() {
      grid.innerHTML = '';
      const list = currentProducts();
      resultCount.textContent = list.length + ' produtos encontrados';

      list.forEach((product) => {
        const node = template.content.cloneNode(true);
        node.querySelector('.product-art').className += ' bg-gradient-to-br ' + product.tone;
        node.querySelector('.product-name').textContent = product.name;
        node.querySelector('.product-category').textContent = product.category;
        node.querySelector('.product-price').textContent = money(product.price);
        node.querySelector('.product-description').textContent = product.description;
        node.querySelector('.add-cart').addEventListener('click', () => {
          cartCount += 1;
          cartButton.textContent = 'Carrinho (' + cartCount + ')';
        });
        grid.appendChild(node);
      });
    }

    searchInput.addEventListener('input', render);
    sortSelect.addEventListener('change', render);
    document.querySelectorAll('input[name="category"]').forEach((input) => input.addEventListener('change', render));
    render();
  </script>
</body>
</html>
