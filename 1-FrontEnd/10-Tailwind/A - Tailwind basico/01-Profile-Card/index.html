<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>01 – Profile Card | Tailwind Básico</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-100 to-slate-200 flex items-center justify-center p-8">

  <div class="bg-white rounded-3xl shadow-xl w-full max-w-sm overflow-hidden">

    <!-- Banner -->
    <div class="h-28 bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500"></div>

    <!-- Avatar -->
    <div class="flex justify-center -mt-14 px-6">
      <div class="w-28 h-28 rounded-full bg-gradient-to-br from-indigo-400 to-purple-600 flex items-center justify-center text-white text-4xl font-extrabold ring-4 ring-white shadow-lg select-none">
        AL
      </div>
    </div>

    <!-- Info -->
    <div class="text-center px-6 pt-3 pb-2">
      <h1 class="text-2xl font-extrabold text-gray-900">Ana Lima</h1>
      <p class="text-indigo-600 font-semibold text-sm mt-1">Senior Frontend Developer</p>
      <p class="text-gray-500 text-sm mt-3 leading-relaxed">
        Apaixonada por interfaces bonitas e código limpo. Especialista em Vue, React e design systems.
      </p>
    </div>

    <!-- Stats -->
    <div class="grid grid-cols-3 divide-x divide-gray-100 border-t border-gray-100 mt-4">
      <div class="flex flex-col items-center py-4">
        <span class="text-xl font-extrabold text-gray-900">248</span>
        <span class="text-xs text-gray-500 mt-0.5">Posts</span>
      </div>
      <div class="flex flex-col items-center py-4">
        <span class="text-xl font-extrabold text-gray-900">14.2k</span>
        <span class="text-xs text-gray-500 mt-0.5">Seguidores</span>
      </div>
      <div class="flex flex-col items-center py-4">
        <span class="text-xl font-extrabold text-gray-900">312</span>
        <span class="text-xs text-gray-500 mt-0.5">Seguindo</span>
      </div>
    </div>

    <!-- Buttons -->
    <div class="flex gap-3 px-6 pb-6 pt-4">
      <button class="flex-1 py-2.5 rounded-xl bg-indigo-600 text-white font-semibold text-sm hover:bg-indigo-700 active:scale-95 transition-all duration-150 shadow-md shadow-indigo-200">
        Seguir
      </button>
      <button class="flex-1 py-2.5 rounded-xl border-2 border-gray-200 text-gray-700 font-semibold text-sm hover:bg-gray-50 active:scale-95 transition-all duration-150">
        Mensagem
      </button>
    </div>

  </div>

</body>
</html>
