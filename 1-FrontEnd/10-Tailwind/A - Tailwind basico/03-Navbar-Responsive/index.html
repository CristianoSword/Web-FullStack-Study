<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>03 – Navbar Responsiva | Tailwind Básico</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

  <nav class="bg-white shadow-md">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="#" class="text-indigo-600 font-extrabold text-xl tracking-tight">MyBrand</a>

      <!-- Desktop menu -->
      <ul class="hidden md:flex gap-6 text-sm font-medium text-gray-600">
        <li><a href="#" class="hover:text-indigo-600 transition-colors">Início</a></li>
        <li><a href="#" class="hover:text-indigo-600 transition-colors">Sobre</a></li>
        <li><a href="#" class="hover:text-indigo-600 transition-colors">Serviços</a></li>
        <li><a href="#" class="hover:text-indigo-600 transition-colors">Contato</a></li>
      </ul>

      <button id="menu-btn" class="md:hidden text-gray-600 focus:outline-none">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
    </div>

    <!-- Mobile menu -->
    <div id="mobile-menu" class="hidden md:hidden px-4 pb-4">
      <ul class="flex flex-col gap-3 text-sm font-medium text-gray-600">
        <li><a href="#" class="block py-1 hover:text-indigo-600 transition-colors">Início</a></li>
        <li><a href="#" class="block py-1 hover:text-indigo-600 transition-colors">Sobre</a></li>
        <li><a href="#" class="block py-1 hover:text-indigo-600 transition-colors">Serviços</a></li>
        <li><a href="#" class="block py-1 hover:text-indigo-600 transition-colors">Contato</a></li>
      </ul>
    </div>
  </nav>

  <main class="max-w-6xl mx-auto px-4 py-16 text-center">
    <h1 class="text-4xl font-extrabold text-gray-900">Navbar Responsiva</h1>
    <p class="text-gray-500 mt-4 text-lg">Redimensione a janela para ver o menu mobile.</p>
  </main>

  <script>
    document.getElementById('menu-btn').addEventListener('click', () => {
      document.getElementById('mobile-menu').classList.toggle('hidden');
    });
  </script>
</body>
</html>
