<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>04 – Form Validation UI | Tailwind Básico</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center px-4">

  <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-md">
    <h1 class="text-2xl font-extrabold text-gray-900 mb-6">Criar conta</h1>

    <form id="form" novalidate class="space-y-5">
      <!-- Nome -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Nome completo</label>
        <input id="name" type="text" placeholder="João Silva"
          class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 transition" />
        <p id="name-err" class="hidden mt-1 text-xs text-red-500">Nome é obrigatório.</p>
      </div>

      <!-- E-mail -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">E-mail</label>
        <input id="email" type="email" placeholder="joao@email.com"
          class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 transition" />
        <p id="email-err" class="hidden mt-1 text-xs text-red-500">E-mail inválido.</p>
      </div>

      <!-- Senha -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
        <input id="password" type="password" placeholder="Mínimo 8 caracteres"
          class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 transition" />
        <p id="pass-err" class="hidden mt-1 text-xs text-red-500">Senha deve ter ao menos 8 caracteres.</p>
      </div>

      <!-- Feedback de sucesso -->
      <div id="success" class="hidden bg-green-50 border border-green-200 text-green-700 text-sm rounded-xl px-4 py-3">
        ✅ Conta criada com sucesso!
      </div>

      <button type="submit"
        class="w-full py-3 bg-indigo-600 text-white font-semibold rounded-xl hover:bg-indigo-700 active:scale-95 transition-all">
        Criar conta
      </button>
    </form>
  </div>

  <script>
    const form = document.getElementById('form');
    const show = (id) => document.getElementById(id).classList.remove('hidden');
    const hide = (id) => document.getElementById(id).classList.add('hidden');
    const setError = (input, errId) => { input.classList.add('border-red-400'); show(errId); };
    const clearError = (input, errId) => { input.classList.remove('border-red-400'); hide(errId); };

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      let valid = true;
      const name = document.getElementById('name');
      const email = document.getElementById('email');
      const pass = document.getElementById('password');

      if (!name.value.trim()) { setError(name, 'name-err'); valid = false; } else clearError(name, 'name-err');
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.value)) { setError(email, 'email-err'); valid = false; } else clearError(email, 'email-err');
      if (pass.value.length < 8) { setError(pass, 'pass-err'); valid = false; } else clearError(pass, 'pass-err');

      if (valid) { hide('success'); setTimeout(() => show('success'), 50); form.reset(); }
    });
  </script>
</body>
</html>
