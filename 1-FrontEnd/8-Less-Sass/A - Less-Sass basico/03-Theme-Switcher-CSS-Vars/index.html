<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sass Theme Switcher | CSS Custom Properties</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="src/css/style.css">
</head>
<body>

  <main class="theme-card">
    <header class="theme-card__header">
      <div class="icon-container">
        <i class="fa-solid fa-wand-magic-sparkles"></i>
      </div>
      <h1>Central de Temas</h1>
      <p>Alternador em tempo real adaptado com mapas Sass compilados em CSS Custom Properties</p>
    </header>

    <section class="theme-card__options">
      <button class="theme-option theme-option--active" data-theme-btn="dark">
        <i class="fa-solid fa-moon"></i>
        Modo Escuro
      </button>
      <button class="theme-option" data-theme-btn="light">
        <i class="fa-solid fa-sun"></i>
        Modo Claro
      </button>
    </section>

    <article class="theme-card__content">
      Selecione um tema acima. O Sass gera dinamicamente as Custom Properties baseando-se no mapa do tema selecionado:
      <code>[data-theme="light"] { ... }</code>
    </article>
  </main>

  <script src="src/js/main.js"></script>
</body>
</html>
