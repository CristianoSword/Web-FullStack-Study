<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sass Icon Utility Generator | Maps & Each Loops</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="src/css/style.css">
</head>
<body>

  <main class="icon-showcase">
    <header class="header">
      <h1>Sass Icon Utility Generator</h1>
      <p>Classes utilitárias geradas por loops Sass mapeando FontAwesome</p>
    </header>

    <!-- Showcase Grid -->
    <section class="grid">
      <div class="icon-card">
        <i class="fa-solid fa-house icon-base icon-size--lg icon-color--purple icon-glow"></i>
        <span>Home</span>
      </div>
      <div class="icon-card">
        <i class="fa-solid fa-user icon-base icon-size--lg icon-color--cyan icon-glow"></i>
        <span>User</span>
      </div>
      <div class="icon-card">
        <i class="fa-solid fa-gear icon-base icon-size--lg icon-color--muted"></i>
        <span>Settings</span>
      </div>
      <div class="icon-card">
        <i class="fa-solid fa-bell icon-base icon-size--lg icon-color--amber icon-glow"></i>
        <span>Bell</span>
      </div>
      <div class="icon-card">
        <i class="fa-solid fa-heart icon-base icon-size--lg icon-color--red icon-glow"></i>
        <span>Heart</span>
      </div>
      <div class="icon-card">
        <i class="fa-solid fa-code icon-base icon-size--lg icon-color--teal icon-glow"></i>
        <span>Code</span>
      </div>
    </section>

    <!-- Tamanhos Disponíveis -->
    <header class="header">
      <h2>Tamanhos de Ícone Gerados</h2>
    </header>
    <div style="display: flex; align-items: center; justify-content: center; gap: 2rem; flex-wrap: wrap;">
      <div>
        <i class="fa-solid fa-bolt icon-base icon-size--xs icon-color--cyan"></i>
        <div style="font-size: 0.75rem; text-align: center; margin-top: 0.5rem; color: #8892b0;">XS</div>
      </div>
      <div>
        <i class="fa-solid fa-bolt icon-base icon-size--sm icon-color--cyan"></i>
        <div style="font-size: 0.75rem; text-align: center; margin-top: 0.5rem; color: #8892b0;">SM</div>
      </div>
      <div>
        <i class="fa-solid fa-bolt icon-base icon-size--md icon-color--cyan"></i>
        <div style="font-size: 0.75rem; text-align: center; margin-top: 0.5rem; color: #8892b0;">MD</div>
      </div>
      <div>
        <i class="fa-solid fa-bolt icon-base icon-size--lg icon-color--cyan"></i>
        <div style="font-size: 0.75rem; text-align: center; margin-top: 0.5rem; color: #8892b0;">LG</div>
      </div>
      <div>
        <i class="fa-solid fa-bolt icon-base icon-size--xl icon-color--cyan icon-glow"></i>
        <div style="font-size: 0.75rem; text-align: center; margin-top: 0.5rem; color: #8892b0;">XL</div>
      </div>
      <div>
        <i class="fa-solid fa-bolt icon-base icon-size--xxl icon-color--cyan icon-glow"></i>
        <div style="font-size: 0.75rem; text-align: center; margin-top: 0.5rem; color: #8892b0;">XXL</div>
      </div>
    </div>

  </main>

</body>
</html>
