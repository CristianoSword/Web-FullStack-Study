<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudo: Advanced Inputs & Datalist</title>
</head>
<body>
    <h1>Inputs Modernos do HTML5</h1>
    
    <form>
        <label for="framework">Escolha um Framework:</label>
        <input list="frameworks" id="framework" name="framework">
        <datalist id="frameworks">
            <option value="React">
            <option value="Vue">
            <option value="Angular">
            <option value="Svelte">
        </datalist>
    </form>

</body>
</html>
