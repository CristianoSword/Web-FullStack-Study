<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudo: Native Dialog API</title>
</head>
<body>
    <h1>Tag &lt;dialog&gt; Nativa</h1>
    
    <button id="openBtn">Abrir Modal</button>

    <dialog id="myModal">
        <h2>Bem-vindo!</h2>
        <p>Este é um modal nativo do HTML5.</p>
        <button id="closeBtn">Fechar</button>
    </dialog>

</body>
</html>
