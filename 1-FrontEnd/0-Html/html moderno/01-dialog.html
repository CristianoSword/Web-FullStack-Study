<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudo: Native Dialog API</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a1a; color: #fff; padding: 20px; }
        button { padding: 10px 20px; cursor: pointer; background: #42cafe; border: none; color: white; font-weight: bold; border-radius: 5px; }
        
        dialog { 
            border: none; border-radius: 10px; padding: 20px; width: 300px;
            background: #2a2a2a; color: white; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        dialog::backdrop { background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(5px); }
    </style>
</head>
<body>
    <h1>Tag &lt;dialog&gt; Nativa</h1>
    
    <button id="openBtn">Abrir Modal</button>

    <dialog id="myModal">
        <h2>Bem-vindo!</h2>
        <p>Este é um modal nativo do HTML5, sem bibliotecas externas.</p>
        <button id="closeBtn">Fechar</button>
    </dialog>

    <script>
        const modal = document.getElementById('myModal');
        const openBtn = document.getElementById('openBtn');
        const closeBtn = document.getElementById('closeBtn');

        // showModal() abre o modal como um "top-layer", bloqueando interação externa
        // Diferente de show(), que abre o elemento mas permite interagir com o fundo.
        openBtn.onclick = () => modal.showModal();
        
        // close() fecha o modal de forma limpa.
        closeBtn.onclick = () => modal.close();

        // Bonus: Fechar ao clicar fora (no backdrop)
        modal.onclick = (e) => {
            if (e.target === modal) modal.close();
        };

        // Referência: https://developer.mozilla.org/en-US/docs/Web/HTML/Element/dialog
    </script>
</body>
</html>
