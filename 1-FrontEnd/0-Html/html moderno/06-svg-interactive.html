<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudo: SVG Interativo</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; flex-direction: column; align-items: center; padding: 50px; }
        svg { cursor: pointer; transition: transform 0.3s ease; }
        svg:hover { transform: scale(1.2); }
        
        circle { 
            fill: #42cafe; stroke: #fff; stroke-width: 2; 
            transition: fill 0.3s, stroke-dashoffset 2s;
            stroke-dasharray: 251; /* 2 * PI * r */
            stroke-dashoffset: 0;
        }
        svg:hover circle { fill: #ff4757; stroke-dashoffset: 251; }
    </style>
</head>
<body>
    <h1>SVG Interativo com CSS</h1>
    
    <svg width="200" height="200" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="40" />
    </svg>

    <p>Passe o mouse no círculo para ver a mágica do CSS no SVG.</p>
</body>
</html>
