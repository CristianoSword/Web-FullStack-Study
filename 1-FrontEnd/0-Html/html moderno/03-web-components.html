<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudo: Web Components</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 40px; }
    </style>
</head>
<body>
    <h1>Web Components Nativos</h1>
    
    <minha-saudacao nome="Cristiano"></minha-saudacao>
    <minha-saudacao nome="Estudante"></minha-saudacao>

    <script>
        class MinhaSaudacao extends HTMLElement {
            static get observedAttributes() { return ['nome']; }

            constructor() {
                super();
                this.attachShadow({ mode: 'open' });
            }

            // lifecycle: disparado quando o elemento entra no DOM
            connectedCallback() {
                this.render();
            }

            // dispara quando um atributo observado muda
            attributeChangedCallback(name, oldValue, newValue) {
                if (oldValue !== newValue) this.render();
            }

            render() {
                const nome = this.getAttribute('nome') || 'Visitante';
                this.shadowRoot.innerHTML = `
                    <style>
                        .card { 
                            background: #333; padding: 20px; border-radius: 10px; 
                            margin-bottom: 10px; border-left: 5px solid #42cafe;
                            transition: transform 0.2s;
                        }
                        .card:hover { transform: scale(1.02); }
                        h2 { color: #42cafe; margin: 0; }
                    </style>
                    <div class="card">
                        <h2>Olá, ${nome}!</h2>
                        <p>Este componente é reativo a mudanças de atributos.</p>
                    </div>
                `;
            }
        }
        customElements.define('minha-saudacao', MinhaSaudacao);
    </script>
</body>
</html>
