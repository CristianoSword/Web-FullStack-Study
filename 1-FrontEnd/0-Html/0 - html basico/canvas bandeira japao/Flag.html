<!DOCTYPE html>
<html>

<body>

	<canvas id="myCanvas" width="600" height="400" style="border:1px solid #d3d3d3;"></canvas>

	<script>
		var c = document.getElementById("myCanvas");
		var ctx = c.getContext("2d");

		// Fundo branco
		ctx.fillStyle = "white";
		ctx.fillRect(0, 0, 600, 400);

		// Círculo vermelho
		ctx.beginPath();
		ctx.arc(300, 200, 100, 0, 2 * Math.PI);
		ctx.fillStyle = "#BC002D"; // vermelho oficial do Japão
		ctx.fill();
	</script>

</body>

</html>
