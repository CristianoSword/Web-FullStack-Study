apiVersion: apps/v1
kind: Deployment
metadata:
  name: 02-pod-deployment-yaml
  labels:
    app: 02-pod-deployment-yaml
spec:
  replicas: 2
  selector:
    matchLabels:
      app: 02-pod-deployment-yaml
  template:
    metadata:
      labels:
        app: 02-pod-deployment-yaml
    spec:
      containers:
      - name: web
        image: nginx:alpine
        ports:
        - containerPort: 80
