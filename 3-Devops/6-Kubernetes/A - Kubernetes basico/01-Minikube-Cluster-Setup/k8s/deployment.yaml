apiVersion: apps/v1
kind: Deployment
metadata:
  name: 01-minikube-cluster-setup
  labels:
    app: 01-minikube-cluster-setup
spec:
  replicas: 2
  selector:
    matchLabels:
      app: 01-minikube-cluster-setup
  template:
    metadata:
      labels:
        app: 01-minikube-cluster-setup
    spec:
      containers:
      - name: web
        image: nginx:alpine
        ports:
        - containerPort: 80
