apiVersion: apps/v1
kind: Deployment
metadata:
  name: 04-kubernetes-service-nodeport
  labels:
    app: 04-kubernetes-service-nodeport
spec:
  replicas: 2
  selector:
    matchLabels:
      app: 04-kubernetes-service-nodeport
  template:
    metadata:
      labels:
        app: 04-kubernetes-service-nodeport
    spec:
      containers:
      - name: web
        image: nginx:alpine
        ports:
        - containerPort: 80
