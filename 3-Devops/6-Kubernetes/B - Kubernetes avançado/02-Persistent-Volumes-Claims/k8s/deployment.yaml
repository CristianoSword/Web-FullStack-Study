apiVersion: apps/v1
kind: Deployment
metadata:
  name: 02-persistent-volumes-claims
  labels:
    app: 02-persistent-volumes-claims
spec:
  replicas: 2
  selector:
    matchLabels:
      app: 02-persistent-volumes-claims
  template:
    metadata:
      labels:
        app: 02-persistent-volumes-claims
    spec:
      containers:
      - name: web
        image: nginx:alpine
        ports:
        - containerPort: 80
