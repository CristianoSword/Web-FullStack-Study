apiVersion: apps/v1
kind: Deployment
metadata:
  name: 04-ingress-controller-routing
  labels:
    app: 04-ingress-controller-routing
spec:
  replicas: 2
  selector:
    matchLabels:
      app: 04-ingress-controller-routing
  template:
    metadata:
      labels:
        app: 04-ingress-controller-routing
    spec:
      containers:
      - name: web
        image: nginx:alpine
        ports:
        - containerPort: 80
        resources:
          limits:
            cpu: "500m"
            memory: "256Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
