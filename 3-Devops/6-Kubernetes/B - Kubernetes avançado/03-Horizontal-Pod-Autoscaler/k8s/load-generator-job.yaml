apiVersion: batch/v1
kind: Job
metadata:
  name: metrics-api-load
  namespace: study-hpa
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: load-generator
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - >
              i=0;
              while [ $i -lt 400 ]; do
                wget -q -O- http://metrics-api/work?ms=120 >/dev/null &
                i=$((i+1));
              done;
              wait
