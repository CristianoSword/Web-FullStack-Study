apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: study-cloud-run
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "5"
        run.googleapis.com/cpu-throttling: "false"
    spec:
      containerConcurrency: 40
      containers:
        - image: us-central1-docker.pkg.dev/study-platform-dev/study-registry/study-cloud-run:latest
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          env:
            - name: APP_ENV
              value: production
            - name: LOG_LEVEL
              value: info
