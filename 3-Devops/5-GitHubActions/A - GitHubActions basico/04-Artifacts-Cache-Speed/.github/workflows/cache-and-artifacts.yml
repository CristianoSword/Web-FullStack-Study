name: Artifacts Cache Speed

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Restore npm cache
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-cache-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            npm-cache-${{ runner.os }}-

      - name: Create build report
        run: node scripts/create-build-output.mjs

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-report
          path: dist/build-report.json

  verify-artifact:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-report
          path: dist

      - name: Print downloaded report
        shell: bash
        run: |
          cat dist/build-report.json
          {
            echo "## Cache and Artifacts"
            echo ""
            echo "- Cache key prefix: npm-cache"
            echo "- Artifact: build-report"
          } >> "$GITHUB_STEP_SUMMARY"
